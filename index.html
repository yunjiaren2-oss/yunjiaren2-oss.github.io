                }
            });

            // 更新面包屑和左边栏激活状态
            document.getElementById('path-indicator').innerText = folderId === 'desktop' ? 'Desktop' : `Desktop > 📁 ${folderId}`;
            
            document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('bg-zinc-200', 'text-zinc-900'));
            const activeBtn = document.getElementById(`btn-${folderId}`);
            if (activeBtn) {
                activeBtn.classList.add('bg-zinc-200', 'text-zinc-900');
            }

            currentFolder = folderId;
            lucide.createIcons();
        }

        // 切换文件夹
        function changeFolder(folderId) {
            renderFolder(folderId);
        }

        // 移动端/轻触支持：单击提示，双击或再次点击打开
        let lastClickedFile = null;
        let clickTimer = null;
        function handleSingleClick(fileId) {
            if (lastClickedFile === fileId) {
                openFile(fileId);
                lastClickedFile = null;
            } else {
                lastClickedFile = fileId;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    lastClickedFile = null;
                }, 1000); // 1秒内再次点击则视为双击打开
            }
        }

        // 打开文件查看器
        function openFile(fileId) {
            const file = fileDatabase[fileId];
            if (file) {
                // 如果是脚本的 lnk 快捷方式，并且在移动端，直接展示内容，里面有一个专门的大按钮跳转
                document.getElementById('explorer-view').classList.add('hidden');
                
                const reader = document.getElementById('reader-view');
                reader.classList.remove('hidden');

                document.getElementById('reader-title').innerText = file.title;
                document.getElementById('reader-tag').innerText = file.tag;
                document.getElementById('reader-body').innerHTML = file.html;

                lucide.createIcons();
            }
        }

        // 关闭文件查看器
        function closeReader() {
            renderFolder(currentFolder);
        }

        // 页面初始化
        window.onload = () => {
            renderFolder('desktop');
        };
    </script>
</body>
</html>
