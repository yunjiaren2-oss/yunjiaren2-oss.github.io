<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任蕴佳 (Yunjia Ren) | 个人系统档案与作品集</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入复古手写及无衬线字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. 超现实 3D 工作台背景与绿草地 */
        body {
            background-color: #b9ccd5; /* 模拟图2温润的天蓝色 */
            font-family: 'Noto Serif SC', serif;
            perspective: 1200px; /* 3D 翻开效果所必须 */
        }

        /* 模拟图2底部的超现实立体绿草地丘陵 */
        .grassy-hills {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh;
            background: linear-gradient(to top, #487232 0%, #5d9243 100%);
            border-top-left-radius: 50% 15%;
            border-top-right-radius: 50% 15%;
            z-index: 1;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.15);
        }
        .grassy-hills-back {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 42vh;
            background: linear-gradient(to top, #395c27 0%, #4a7833 100%);
            border-top-left-radius: 40% 12%;
            border-top-right-radius: 40% 12%;
            z-index: 0;
        }

        /* 2. 文件夹 3D 翻转动效 */
        #closed-folder {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
            transform-style: preserve-3d;
        }
        #opened-folder {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }

                repeating-linear-gradient(-45deg, rgba(255,255,255,0.4) 0px, rgba(255,255,255,0.4) 2px,
